<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Minha Cobertura de Eventos</title>
		<style>
			:root {
				--primary: #2c3e50;
				--bg: #f4f7f6;
				--white: #ffffff;
			}
			body {
				font-family: "Inter", sans-serif;
				background: var(--bg);
				margin: 0;
				padding: 20px;
				color: var(--primary);
			}
			h1 {
				text-align: center;
				margin-bottom: 40px;
			}
			.container {
				display: flex;
				gap: 30px;
				max-width: 1200px;
				margin: 0 auto;
				flex-wrap: wrap;
			}
			.column {
				flex: 1;
				min-width: 300px;
			}
			.column-title {
				font-size: 1.2rem;
				font-weight: 800;
				text-transform: uppercase;
				border-bottom: 3px solid var(--primary);
				padding-bottom: 10px;
				margin-bottom: 20px;
				display: flex;
				justify-content: space-between;
			}
			.event-card {
				background: var(--white);
				border-radius: 10px;
				overflow: hidden;
				box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
				margin-bottom: 20px;
				transition: transform 0.2s;
				cursor: pointer;
				text-decoration: none;
				display: block;
			}
			.event-card:hover {
				transform: translateY(-3px);
			}
			.event-img {
				width: 100%;
				height: 160px;
				object-fit: cover;
				background: #ddd;
			}
			.event-content {
				padding: 15px;
			}
			.event-name {
				font-weight: bold;
				font-size: 0.9rem;
				margin-bottom: 8px;
				line-height: 1.3;
				color: #1a1a1a;
			}
			.event-meta {
				font-size: 0.75rem;
				color: #666;
			}
		</style>
	</head>
	<body>
		<h1>📸 Últimas Coberturas</h1>

		<div class="container">
			<div class="column">
				<div class="column-title">Fotop <span id="count-fotop"></span></div>
				<div id="list-fotop"></div>
			</div>
			<div class="column">
				<div class="column-title">Foco Radical <span id="count-foco"></span></div>
				<div id="list-foco"></div>
			</div>
		</div>

		<script>
			async function loadEvents() {
				try {
					const response = await fetch("eventos.json?v=" + Date.now());
					const data = await response.json();

					renderList(data.fotop, "list-fotop", "count-fotop");
					renderList(data.foco_radical, "list-foco", "count-foco");
				} catch (err) {
					console.error("Erro ao carregar eventos:", err);
				}
			}

			function renderList(list, containerId, countId) {
				const container = document.getElementById(containerId);
				document.getElementById(countId).innerText = `(${list.length})`;

				if (!list || list.length === 0) {
					container.innerHTML = "<p>Nenhum evento recente.</p>";
					return;
				}

				container.innerHTML = list
					.map(
						(ev) => `
                <a href="${ev.link}" class="event-card" target="_blank">
                    <img src="${ev.imagem}" class="event-img" onerror="this.src='https://placehold.co/400x225?text=Sem+Foto'">
                    <div class="event-content">
                        <div class="event-name">${ev.titulo}</div>
                        <div class="event-meta">📅 ${ev.data} • 📍 ${ev.local}</div>
                    </div>
                </a>
            `,
					)
					.join("");
			}

			loadEvents();
		</script>
	</body>
</html>
