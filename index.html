<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Meus Eventos Cobertos</title>
		<style>
			body {
				font-family: sans-serif;
				background: #f0f2f5;
				padding: 20px;
				display: flex;
				justify-content: center;
			}
			.container {
				display: flex;
				gap: 30px;
				width: 100%;
				max-width: 1100px;
			}
			.column {
				flex: 1;
				min-width: 300px;
			}
			.platform-name {
				font-size: 1.4rem;
				font-weight: bold;
				text-align: center;
				margin-bottom: 20px;
				padding-bottom: 10px;
				border-bottom: 3px solid #333;
			}

			.event-card {
				background: #fff;
				border-radius: 10px;
				overflow: hidden;
				margin-bottom: 20px;
				box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
				position: relative;
				aspect-ratio: 16/9;
			}
			.event-image {
				width: 100%;
				height: 100%;
				object-fit: cover;
			}
			.event-info {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				padding: 15px;
				background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
				color: #fff;
			}
			.event-title {
				font-weight: bold;
				font-size: 0.9rem;
				margin-bottom: 5px;
			}
			.event-details {
				font-size: 0.75rem;
				opacity: 0.8;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<div class="column">
				<div class="platform-name">FOTOP</div>
				<div id="fotop-container">
					<p style="text-align: center">Buscando eventos...</p>
				</div>
			</div>

			<div class="column">
				<div class="platform-name">Foco Radical</div>
				<div id="foco-radical-container">
					<p style="text-align: center">Em breve...</p>
				</div>
			</div>
		</div>

		<script>
			async function carregarEventos() {
				const containerFotop = document.getElementById("fotop-container");

				try {
					// O '?t=' força o navegador a baixar a versão nova e ignorar o cache
					const url = "eventos.json?t=" + new Date().getTime();
					console.log("Tentando baixar:", url);

					const response = await fetch(url);
					if (!response.ok) throw new Error("Arquivo json não encontrado");

					const data = await response.json();
					console.log("Dados carregados com sucesso:", data);

					if (data.fotop && data.fotop.length > 0) {
						containerFotop.innerHTML = ""; // Limpa o texto de carregamento

						data.fotop.forEach((evento) => {
							containerFotop.innerHTML += `
                            <a href="${evento.link}" target="_blank" style="text-decoration: none;">
                                <div class="event-card">
                                    <img src="${evento.imagem}" class="event-image" onerror="this.src='https://via.placeholder.com/400x225?text=Erro+na+Imagem'">
                                    <div class="event-info">
                                        <div class="event-title">${evento.titulo}</div>
                                        <div class="event-details">
                                            <span>📅 ${evento.data}</span> | <span>📍 ${evento.local}</span>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        `;
						});
					} else {
						containerFotop.innerHTML = "<p>Nenhum evento encontrado no JSON.</p>";
					}
				} catch (error) {
					console.error("Erro no carregamento:", error);
					containerFotop.innerHTML = `<p style="color:red">Erro: ${error.message}</p>`;
				}
			}

			// Inicia a busca
			carregarEventos();
		</script>
	</body>
</html>
